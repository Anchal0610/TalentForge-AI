version: '3.8'

services:
  # Nexora AI Streamlit Web Application
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: nexora_app
    ports:
      - "8501:8501"
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_MODEL_NAME=${OPENAI_MODEL_NAME:-gpt-4o-mini}
      - MISTRAL_API_KEY=${MISTRAL_API_KEY}
      - QDRANT_URL=http://qdrant:6333
      - DATABASE_URL=sqlite:///data/nexora_career.db
    volumes:
      - sqlite_data:/app/data
      - ./logs:/app/logs
    depends_on:
      - qdrant
    restart: unless-stopped

  # Qdrant Vector Database
  qdrant:
    image: qdrant/qdrant:latest
    container_name: nexora_qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_storage:/qdrant/storage
    restart: unless-stopped

volumes:
  sqlite_data:
  qdrant_storage:
